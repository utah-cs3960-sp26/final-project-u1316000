<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/player.css') }}">
</head>
<body class="player-body">
    <div class="player-root">
        <button id="settings-button" class="settings-button" type="button" aria-label="Open settings">
            <span class="gear-mark" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
            </span>
        </button>

        <div id="settings-menu" class="settings-menu hidden" role="dialog" aria-label="Settings">
            <p class="settings-title">Settings</p>
            <button id="restart-button" class="settings-action" type="button">Restart Adventure</button>
        </div>

        <section class="scene-shell" aria-label="Adventure scene">
            <div class="scene-backdrop">
                <div id="background-image" class="background-image hidden" aria-hidden="true"></div>
                <div id="fallback-backdrop" class="fallback-backdrop" aria-hidden="true">
                    <div class="sky-glow"></div>
                    <div class="mist mist-a"></div>
                    <div class="mist mist-b"></div>
                    <div class="mushroom mushroom-a">
                        <span class="cap"></span>
                        <span class="stem"></span>
                    </div>
                    <div class="mushroom mushroom-b">
                        <span class="cap"></span>
                        <span class="stem"></span>
                    </div>
                    <div class="mushroom mushroom-c">
                        <span class="cap"></span>
                        <span class="stem"></span>
                    </div>
                    <div class="mushroom mushroom-d">
                        <span class="cap"></span>
                        <span class="stem"></span>
                    </div>
                    <div class="grass-band"></div>
                </div>
                <div class="stage-vignette" aria-hidden="true"></div>
            </div>

            <div class="scene-stage" aria-hidden="true">
                <div class="hud-top">
                    <div class="location-pill" id="location-pill">Mushroom Field</div>
                    <div class="hint-pill">Space: reveal / continue, H: hide HUD</div>
                </div>
                <div id="actors-layer" class="actors-layer"></div>
            </div>

            <div class="story-panel">
                <div class="dialogue-box">
                    <div class="speaker-row">
                        <span class="speaker-label" id="speaker-label">Narrator</span>
                        <span class="line-progress" id="line-progress">1 / 1</span>
                    </div>
                    <p id="dialogue-text" class="dialogue-text"></p>
                    <div class="dialogue-footer">
                        <button id="continue-button" class="continue-button" type="button">Continue</button>
                        <span id="status-text" class="status-text">Press Space to reveal or continue.</span>
                    </div>
                </div>

                <div id="choices-panel" class="choices-panel hidden" aria-label="Choices"></div>
            </div>
        </section>
    </div>

    <script id="player-story-data" type="application/json">{{ story_data | tojson }}</script>
    <script src="{{ url_for('static', path='/player.js') }}"></script>
</body>
</html>
